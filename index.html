<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Aset Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-school text-xl"></i>
                    <span class="font-bold text-lg tracking-wide">E-Aset Sekolah</span>
                </div>
                <div>
                    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                        <i class="fa-solid fa-plus mr-1"></i> Tambah Aset
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Senarai Inventori</h1>
                <p class="text-slate-500 text-sm">Urus dan rekod aset secara berpusat.</p>
            </div>
            <div class="relative w-full md:w-64">
                <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" placeholder="Cari aset..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
        </div>

        <div class="glass-card shadow-sm rounded-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">No. Pendaftaran</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Nama Aset</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Kategori</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Lokasi</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-200" id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="asetModal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center backdrop-blur-sm z-50 overflow-y-auto">
        <div class="bg-white rounded-xl shadow-xl w-11/12 md:w-1/2 max-w-lg p-6 my-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800" id="modalTitle">Tambah Aset Baru</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <form id="asetForm" onsubmit="simpanData(event)">
                <input type="hidden" id="asetId">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">No. Pendaftaran</label>
                        <input type="text" id="noDaftar" required placeholder="Cth: SKT/P/24/001" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">No. Siri <span class="text-xs text-slate-400">(Pilihan)</span></label>
                        <input type="text" id="noSiri" placeholder="Cth: SN123456" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Aset</label>
                    <input type="text" id="namaAset" required placeholder="Cth: Meja Murid Saiz 2" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                        <select id="kategoriAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Pilih...</option>
                            <option value="Perabot">Perabot</option>
                            <option value="Elektronik / PC">Elektronik / PC</option>
                            <option value="Buku / ABM">Buku / ABM</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lokasi</label>
                        <input type="text" id="lokasiAset" required placeholder="Cth: Kelas 6 Usaha" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                    <select id="statusAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Baik">Baik</option>
                        <option value="Rosak">Rosak</option>
                        <option value="Dihapus Kira">Dihapus Kira</option>
                    </select>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md font-medium">Batal</button>
                    <button type="submit" id="btnSimpan" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium flex items-center gap-2">
                        Simpan Aset
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzJ_hJvfC-r2ZsV9iwVrQgGeq2cI6EPtTLjmNeCtcyR21S207jhvJE_LN9PY8fzQo4/exec'; 
        
        const modal = document.getElementById('asetModal');
        const form = document.getElementById('asetForm');
        const tableBody = document.getElementById('tableBody');
        const btnSimpan = document.getElementById('btnSimpan');

        function openModal() {
            form.reset();
            document.getElementById('asetId').value = '';
            document.getElementById('modalTitle').innerText = 'Tambah Aset Baru';
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        // Fungsi Pintar: Auto-tambah nombor di hujung pendaftaran
        function autoIncrement(str) {
            if (!str) return '';
            // Cari digit di hujung perkataan dan tambah 1, kekalkan digit kosong (cth: 001 -> 002)
            return str.replace(/(\d+)$/, function(match) {
                return String(parseInt(match, 10) + 1).padStart(match.length, '0');
            });
        }

        function duplicateRecord(noDaftar, nama, kategori, lokasi, status) {
            document.getElementById('asetId').value = ''; 
            document.getElementById('noDaftar').value = autoIncrement(noDaftar); // Auto-jana No Pendaftaran baru
            document.getElementById('noSiri').value = ''; // Kosongkan nombor siri sebab ia unik untuk setiap unit
            document.getElementById('namaAset').value = nama;
            document.getElementById('kategoriAset').value = kategori;
            document.getElementById('lokasiAset').value = lokasi;
            document.getElementById('statusAset').value = status || 'Baik';
            
            document.getElementById('modalTitle').innerText = 'Duplicate Aset (Semak No. Pendaftaran)';
            modal.classList.remove('hidden');
        }

        async function muatData() {
            tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-slate-500">Sedang memuat turun data...</td></tr>';
            try {
                // Tambah parameter untuk elak browser simpan cache lama
                const response = await fetch(scriptURL + "?t=" + new Date().getTime());
                const data = await response.json();
                
                tableBody.innerHTML = '';
                
                if(data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-slate-500">Tiada rekod dijumpai.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    // Selamatkan data dari undefined jika lajur kosong
                    const noDaftar = item['No Pendaftaran'] || '-';
                    const nama = item['Nama Aset'] || '-';
                    const kategori = item['Kategori'] || '-';
                    const lokasi = item['Lokasi'] || '-';
                    const status = item['Status'] || 'Baik';

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-blue-700">${noDaftar}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-800">${nama}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${kategori}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${lokasi}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <button onclick="duplicateRecord('${noDaftar}', '${nama}', '${kategori}', '${lokasi}', '${status}')" class="text-blue-600 hover:text-blue-900 bg-blue-50 px-3 py-1 rounded-md transition-colors border border-blue-100">
                                    <i class="fa-regular fa-copy mr-1"></i> Duplicate
                                </button>
                            </td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-red-500">Gagal memuat turun data. Semak konsol atau pastikan Script di "Deploy as New Version".</td></tr>';
            }
        }

        async function simpanData(e) {
            e.preventDefault();
            btnSimpan.innerText = 'Menyimpan...';
            btnSimpan.disabled = true;

            const jsonData = {
                id: document.getElementById('asetId').value,
                no_daftar: document.getElementById('noDaftar').value,
                no_siri: document.getElementById('noSiri').value,
                nama_aset: document.getElementById('namaAset').value,
                kategori: document.getElementById('kategoriAset').value,
                lokasi: document.getElementById('lokasiAset').value,
                status: document.getElementById('statusAset').value
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jsonData)
                });
                
                closeModal();
                // Sengaja letak delay sedikit supaya Sheets sempat proses sebelum muat semula
                setTimeout(() => {
                    muatData();
                }, 1000);
            } catch (error) {
                alert('Berlaku ralat semasa menyimpan data.');
            } finally {
                btnSimpan.innerText = 'Simpan Aset';
                btnSimpan.disabled = false;
            }
        }

        window.onload = muatData;
    </script>
</body>
</html>
