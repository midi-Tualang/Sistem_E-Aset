<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Aset Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-school text-xl"></i>
                    <span class="font-bold text-lg tracking-wide">E-Aset Sekolah</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="resetSemua()" class="bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                        <i class="fa-solid fa-triangle-exclamation mr-1"></i> Reset
                    </button>
                    <button onclick="openModal('tambah')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                        <i class="fa-solid fa-plus mr-1"></i> Tambah Aset
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Senarai Inventori Aset</h1>
                <p class="text-slate-500 text-sm">Pangkalan data utama Kew.PA</p>
            </div>
            <div class="relative w-full md:w-64">
                <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="carianData()" placeholder="Cari aset..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
        </div>

        <div class="glass-card shadow-sm rounded-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200" id="asetTable">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">No. Pendaftaran</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Nama Aset</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Kategori</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Lokasi</th>
                            <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-200" id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="asetModal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center backdrop-blur-sm z-50 overflow-y-auto">
        <div class="bg-white rounded-xl shadow-xl w-11/12 md:w-1/2 max-w-lg p-6 my-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800" id="modalTitle">Tambah Aset Baru</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <form id="asetForm" onsubmit="simpanData(event)">
                <input type="hidden" id="actionType" value="tambah">
                <input type="hidden" id="rowIndexField">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">No. Pendaftaran</label>
                        <input type="text" id="noDaftar" required placeholder="Cth: SKT/H/24/001" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono text-blue-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">No. Siri</label>
                        <input type="text" id="noSiri" placeholder="(Pilihan)" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Aset</label>
                    <select id="namaAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">Pilih Nama Aset...</option>
                        </select>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                        <select id="kategoriAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="">Pilih...</option>
                            <option value="Aset Bernilai Rendah">Aset Bernilai Rendah</option>
                            <option value="Harta Modal">Harta Modal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lokasi</label>
                        <select id="lokasiAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="">Pilih Lokasi...</option>
                            </select>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                    <select id="statusAset" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="Baik">Baik</option>
                        <option value="Sedang Diselenggara">Sedang Diselenggara</option>
                        <option value="Rosak / Lupus">Rosak / Lupus</option>
                    </select>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md font-medium text-sm">Batal</button>
                    <button type="submit" id="btnSimpan" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium text-sm flex items-center gap-2">
                        Simpan Rekod
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL ANDA SEPERTI BIASA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzJ_hJvfC-r2ZsV9iwVrQgGeq2cI6EPtTLjmNeCtcyR21S207jhvJE_LN9PY8fzQo4/exec'; 
        
        const modal = document.getElementById('asetModal');
        const form = document.getElementById('asetForm');
        const tableBody = document.getElementById('tableBody');
        const btnSimpan = document.getElementById('btnSimpan');

        let dataTetapanGlobal = { lokasi: [], namaAset: [] };

        function openModal(jenisTindakan) {
            form.reset();
            document.getElementById('actionType').value = jenisTindakan;
            document.getElementById('modalTitle').innerText = jenisTindakan === 'edit' ? 'Kemaskini Aset' : 'Tambah Aset Baru';
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        function autoIncrement(str) {
            if (!str) return '';
            return str.replace(/(\d+)$/, function(match) {
                return String(parseInt(match, 10) + 1).padStart(match.length, '0');
            });
        }

        function panggilBorang(action, rowIndex, noDaftar, noSiri, nama, kategori, lokasi, status) {
            document.getElementById('actionType').value = action;
            document.getElementById('rowIndexField').value = rowIndex;
            
            document.getElementById('noDaftar').value = action === 'duplicate' ? autoIncrement(noDaftar) : noDaftar;
            document.getElementById('noSiri').value = action === 'duplicate' ? '' : noSiri;
            
            // Masukkan nilai ke dropdown
            document.getElementById('namaAset').value = nama;
            document.getElementById('kategoriAset').value = kategori;
            document.getElementById('lokasiAset').value = lokasi;
            document.getElementById('statusAset').value = status || 'Baik';
            
            if (action === 'duplicate') {
                document.getElementById('modalTitle').innerText = 'Duplicate Rekod';
                document.getElementById('actionType').value = 'tambah'; 
            } else {
                document.getElementById('modalTitle').innerText = 'Kemaskini Rekod';
            }
            modal.classList.remove('hidden');
        }

        async function padamRekod(rowIndex, namaAset) {
            if(confirm(`Adakah anda pasti mahu memadam rekod "${namaAset}"?\nData ini tidak boleh dikembalikan.`)) {
                try {
                    await fetch(scriptURL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'delete', rowIndex: rowIndex })
                    });
                    setTimeout(muatData, 800);
                } catch (error) { alert('Gagal memadam rekod.'); }
            }
        }

        async function resetSemua() {
            let pass = prompt("AMARAN: Ini akan memadam KESELURUHAN rekod inventori aset!\nSila masukkan kata laluan:");
            if(pass === "aset2026") {
                if(confirm("Pengesahan Terakhir: Padam semua data sekarang?")) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-red-500 font-bold">Sedang memadam pangkalan data...</td></tr>';
                    try {
                        await fetch(scriptURL, {
                            method: 'POST', mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'reset' })
                        });
                        setTimeout(() => { muatData(); }, 1000);
                    } catch (error) { alert('Gagal membersihkan data.'); }
                }
            } else if (pass !== null) { alert("Kata laluan salah."); }
        }

        async function muatData() {
            tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-slate-500">Menyegerak data dari Google Sheets...</td></tr>';
            try {
                const response = await fetch(scriptURL + "?t=" + new Date().getTime());
                const responseData = await response.json();
                
                const dataAset = responseData.aset;
                dataTetapanGlobal = responseData.tetapan; // Simpan senarai dropdown
                
                // --- KEMASKINI DROPDOWN FORM ---
                const selectLokasi = document.getElementById('lokasiAset');
                const selectNama = document.getElementById('namaAset');
                
                selectLokasi.innerHTML = '<option value="">Pilih Lokasi...</option>';
                dataTetapanGlobal.lokasi.forEach(lok => selectLokasi.add(new Option(lok, lok)));

                selectNama.innerHTML = '<option value="">Pilih Nama Aset...</option>';
                dataTetapanGlobal.namaAset.forEach(nama => selectNama.add(new Option(nama, nama)));
                // -------------------------------

                tableBody.innerHTML = '';
                
                if(dataAset.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-slate-500">Pangkalan data inventori kosong.</td></tr>';
                    return;
                }

                dataAset.forEach(item => {
                    const rowIdx = item['rowIndex'];
                    const noDaftarStr = String(item['No Pendaftaran'] || '-').replace(/'/g, "\\'");
                    const noSiriStr = String(item['No Siri'] || '').replace(/'/g, "\\'");
                    const namaStr = String(item['Nama Aset'] || '-').replace(/'/g, "\\'");
                    const katStr = String(item['Kategori'] || '-').replace(/'/g, "\\'");
                    const lokStr = String(item['Lokasi'] || '-').replace(/'/g, "\\'");
                    const statusStr = String(item['Status'] || 'Baik').replace(/'/g, "\\'");

                    let badgeColor = statusStr === 'Baik' ? 'bg-green-100 text-green-700' : 
                                     (statusStr === 'Rosak / Lupus' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700');

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors search-row">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-800 border-l-4 border-blue-500">${item['No Pendaftaran'] || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-800">
                                ${item['Nama Aset'] || '-'}
                                <div class="text-xs text-slate-400 font-normal mt-0.5">SN: ${item['No Siri'] || 'Tiada'}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-slate-100 text-slate-600">${item['Kategori'] || '-'}</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                                <div>${item['Lokasi'] || '-'}</div>
                                <span class="px-2 mt-1 inline-flex text-xs leading-5 font-semibold rounded-full ${badgeColor}">${statusStr}</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <div class="flex justify-end gap-2">
                                    <button onclick="panggilBorang('duplicate', ${rowIdx}, '${noDaftarStr}', '${noSiriStr}', '${namaStr}', '${katStr}', '${lokStr}', '${statusStr}')" class="text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 p-2 rounded transition-colors"><i class="fa-regular fa-copy"></i></button>
                                    <button onclick="panggilBorang('edit', ${rowIdx}, '${noDaftarStr}', '${noSiriStr}', '${namaStr}', '${katStr}', '${lokStr}', '${statusStr}')" class="text-slate-500 hover:text-green-600 bg-slate-100 hover:bg-green-50 p-2 rounded transition-colors"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="padamRekod(${rowIdx}, '${namaStr}')" class="text-slate-500 hover:text-red-600 bg-slate-100 hover:bg-red-50 p-2 rounded transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-red-500">Gagal menyambung ke Google Sheets.</td></tr>';
            }
        }

        async function simpanData(e) {
            e.preventDefault();
            btnSimpan.innerText = 'Memproses...';
            btnSimpan.disabled = true;

            const payloadData = {
                action: document.getElementById('actionType').value,
                rowIndex: document.getElementById('rowIndexField').value,
                data: {
                    id: new Date().getTime(),
                    no_daftar: document.getElementById('noDaftar').value,
                    no_siri: document.getElementById('noSiri').value,
                    nama_aset: document.getElementById('namaAset').value,
                    kategori: document.getElementById('kategoriAset').value,
                    lokasi: document.getElementById('lokasiAset').value,
                    status: document.getElementById('statusAset').value
                }
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadData)
                });
                closeModal();
                setTimeout(muatData, 1000); 
            } catch (error) { alert('Berlaku ralat sistem.'); } 
            finally {
                btnSimpan.innerText = 'Simpan Rekod';
                btnSimpan.disabled = false;
            }
        }

        function carianData() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.getElementsByClassName("search-row");
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].innerText.toLowerCase();
                rows[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        window.onload = muatData;
    </script>
</body>
</html>
